  .qtext { font-size: 17px; font-weight: 600; line-height: 1.6; margin-bottom: 24px; }
  .opt { display: block; width: 100%; text-align: left; background: #13131f; border: 1px solid #1e1e3a; color: #b0b0d0; padding: 13px 16px; border-radius: 8px; font-size: 14px; line-height: 1.5; margin-bottom: 10px; transition: all .15s; }

var KEY="ds_prep_app_v1";
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch(e){return {};}}
function save(p){try{localStorage.setItem(KEY,JSON.stringify(p));}catch(e){}}
var progress=load();
var state={view:"curriculum",day:null,qi:0,sel:null,score:0,done:false};
var allDays=[];WEEKS.forEach(function(w){w.days.forEach(function(d){allDays.push(d);});});
var totalQuiz=allDays.filter(function(d){return d.quiz.length>0;}).length;

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function stats(){
 var studied=Object.keys(progress).filter(function(k){return progress[k]&&progress[k].studied;}).length;
 var qd=Object.keys(progress).filter(function(k){return progress[k]&&progress[k].quizScore!==undefined;});
 var avg=qd.length?Math.round(qd.reduce(function(a,k){return a+progress[k].quizScore;},0)/qd.length):0;
 return {studied:studied,quizzed:qd.length,avg:avg};
}
function dayStatus(d){
 var p=progress[d.day];
 if(!p)return "pending";
 if(p.quizScore!==undefined)return p.quizScore>=67?"passed":"review";
 if(p.studied)return "studied";
 return "pending";
}

function render(){
 var el=document.getElementById("app");
 if(state.view==="quiz")el.innerHTML=renderQuiz();
 else if(state.view==="stats")el.innerHTML=renderStats();
 else el.innerHTML=renderCurriculum();
 window.scrollTo(0,0);
}

function renderCurriculum(){
 var s=stats();
 var h="";
 h+="<div class='eyebrow'>Santosh - DS Interview Prep - Hindi sources</div>";
 h+="<div class='row'><h1>60-Day Curriculum</h1><button class='statbtn' onclick='go(\"stats\")'>Stats &rarr;</button></div>";
 h+="<div class='bar'><div style='width:"+(s.studied/60*100)+"%'></div></div>";
 h+="<div class='meta'><span>"+s.studied+"/60 studied</span><span>"+s.quizzed+" quizzes</span><span style='color:"+(s.avg>=67?'#4ade80':'#f59e0b')+"'>avg "+s.avg+"%</span></div>";
 h+="<div class='legend'><span style='color:#4ade80'>&#10003; Passed</span><span style='color:#f59e0b'>! Review</span><span style='color:#90c0ff'>&#128214; Studied</span><span style='color:#444'>&middot; Pending</span></div>";
 WEEKS.forEach(function(w){
  h+="<div class='weekhdr'>Week "+w.week+" &mdash; "+esc(w.theme)+"</div>";
  w.days.forEach(function(d){
   var st=dayStatus(d);var p=progress[d.day];
   var isRest=d.quiz.length===0&&!d.link;
   var bg=st==="passed"?"#0d1f14":st==="review"?"#1f0d0d":st==="studied"?"#0d1428":"#13131f";
   var bc=st==="passed"?"#1a3a22":st==="review"?"#3a1a1a":"#1e1e3a";
   h+="<div class='card' style='background:"+bg+";border-color:"+bc+"'><div class='cardrow'>";
   h+="<div class='dnum'>D"+d.day+"</div>";
   h+="<div style='flex:1'><div class='topic'>"+esc(d.topic)+"</div>";
   if(d.src)h+="<div class='srclabel'>"+esc(d.src)+"</div>";
   if(p&&p.quizScore!==undefined)h+="<div class='qscore' style='color:"+(p.quizScore>=67?'#4ade80':'#f59e0b')+"'>Quiz: "+p.quizScore+"%</div>";
   h+="</div><div class='actions'>";
   if(d.link)h+="<a class='btn study' href='"+d.link+"' target='_blank' rel='noopener'>Study &rarr;</a>";
   if(!isRest&&!(p&&p.studied))h+="<button class='btn read' onclick='markRead("+d.day+")'>Read &#10003;</button>";
   if(d.quiz.length>0)h+="<button class='btn quiz"+(st==="passed"?" passed":"")+"' onclick='startQuiz("+d.day+")'>"+(p&&p.quizScore!==undefined?"Retry":"Quiz")+"</button>";
   if(isRest)h+="<span class='rest'>REST</span>";
   h+="</div></div></div>";
  });
 });
 return h;
}

function renderQuiz(){
 var d=allDays.filter(function(x){return x.day===state.day;})[0];
 if(state.done){
  var pct=Math.round(state.score/d.quiz.length*100);
  var ok=pct>=67;
  return "<div class='center'><div class='bigicon'>"+(ok?"&#10003;":"&#9888;")+"</div>"+
   "<div class='bigscore' style='color:"+(ok?'#4ade80':'#f59e0b')+"'>"+state.score+"/"+d.quiz.length+"</div>"+
   "<div style='color:#6c6c9c;margin:4px 0 8px'>"+pct+"%</div>"+
   "<div style='color:"+(ok?'#4ade80':'#f59e0b')+";font-size:14px;margin-bottom:28px'>"+(ok?"Good. Move on.":"Review this topic again.")+"</div>"+
   "<button class='next' onclick='go(\"curriculum\")'>Back to Curriculum</button></div>";
 }
 var q=d.quiz[state.qi];var rev=state.sel!==null;
 var h="<div class='qhead'><button class='backbtn' onclick='go(\"curriculum\")'>&larr; Back</button><span style='color:#6c6c9c;font-size:13px'>Day "+d.day+" &middot; Q"+(state.qi+1)+"/"+d.quiz.length+"</span></div>";
 h+="<div class='qprog'><div style='width:"+(state.qi/d.quiz.length*100)+"%'></div></div>";
 h+="<div class='qtext'>"+esc(q.q)+"</div>";
 q.o.forEach(function(opt){
  var cls="opt";
  if(rev&&opt===q.a)cls+=" correct";
  else if(rev&&opt===state.sel&&opt!==q.a)cls+=" wrong";
  h+="<button class='"+cls+"' onclick='answer("+JSON.stringify(opt).replace(/'/g,"&#39;")+")'>"+esc(opt)+"</button>";
 });
 if(rev){
  var ok=state.sel===q.a;
  h+="<div class='feedback "+(ok?"ok":"no")+"'>"+(ok?"Correct.":"Answer: "+esc(q.a))+"</div>";
  h+="<button class='next' onclick='nextQ()'>"+(state.qi+1>=d.quiz.length?"See Results":"Next &rarr;")+"</button>";
 }
 return h;
}

function renderStats(){
 var s=stats();
 var h="<div class='qhead'><button class='backbtn' onclick='go(\"curriculum\")'>&larr; Back</button><span style='color:#6c6c9c;font-size:14px'>Progress Report</span></div>";
 h+="<div class='statgrid'>";
 h+="<div class='statcell'><div class='v'>"+s.studied+"/60</div><div class='l'>Days Studied</div></div>";
 h+="<div class='statcell'><div class='v'>"+s.quizzed+"/"+totalQuiz+"</div><div class='l'>Quizzes Done</div></div>";
 h+="<div class='statcell'><div class='v'>"+s.avg+"%</div><div class='l'>Avg Score</div></div></div>";
 WEEKS.forEach(function(w){
  var days=w.days.filter(function(d){return d.quiz.length>0;});
  var sc=days.map(function(d){return progress[d.day]?progress[d.day].quizScore:undefined;}).filter(function(x){return x!==undefined;});
  var avg=sc.length?Math.round(sc.reduce(function(a,b){return a+b;},0)/sc.length):null;
  h+="<div class='wkstat'><div class='row' style='align-items:center'><div><span style='color:#6c6c9c;font-size:12px'>Week "+w.week+" &middot; </span><span style='font-size:13px'>"+esc(w.theme)+"</span></div>";
  h+="<div style='text-align:right'><div style='font-size:13px;font-weight:600;color:"+(avg>=67?'#4ade80':avg!==null?'#f59e0b':'#6c6c9c')+"'>"+(avg!==null?avg+"%":"&mdash;")+"</div><div style='font-size:11px;color:#6c6c9c'>"+sc.length+"/"+days.length+"</div></div></div>";
  h+="<div class='bar' style='margin-top:10px'><div style='width:"+(sc.length/days.length*100)+"%;background:"+(avg>=67?'#4ade80':'#3b5bdb')+"'></div></div></div>";
 });
 var hist=allDays.filter(function(d){return d.quiz.length>0&&progress[d.day]&&progress[d.day].quizScore!==undefined;});
 if(hist.length){
  h+="<div style='color:#6c6c9c;font-size:12px;margin:20px 0 10px'>Score History</div>";
  hist.forEach(function(d){
   var sc=progress[d.day].quizScore;
   h+="<div class='hist'><span style='font-size:12px;color:#9090b0'>D"+d.day+": "+esc(d.topic.slice(0,34))+(d.topic.length>34?"...":"")+"</span><span style='font-size:13px;font-weight:600;color:"+(sc>=67?'#4ade80':'#f59e0b')+"'>"+sc+"%</span></div>";
  });
 }
 return h;
}

function go(v){state.view=v;render();}
function markRead(day){progress[day]=progress[day]||{};progress[day].studied=true;save(progress);render();}
function startQuiz(day){state.view="quiz";state.day=day;state.qi=0;state.sel=null;state.score=0;state.done=false;render();}
function answer(opt){if(state.sel!==null)return;state.sel=opt;render();}
function nextQ(){
 var d=allDays.filter(function(x){return x.day===state.day;})[0];
 if(state.sel===d.quiz[state.qi].a)state.score++;
 if(state.qi+1>=d.quiz.length){
  var pct=Math.round(state.score/d.quiz.length*100);
  progress[d.day]=progress[d.day]||{};progress[d.day].studied=true;progress[d.day].quizScore=pct;save(progress);
  state.done=true;
 }else{state.qi++;state.sel=null;}
 render();
}
render();
</script>
